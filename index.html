<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Earth</title>
    <link rel="shortcut icon" href="./assets/hero-leaf1.png" type="image/x-icon">

    <!--Tailwind + Daisy UI-->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#DCFCE7] m-0 p-0">
    <header>
        <nav class="bg-[#15803D] p-6 mx-auto flex flex-col sm:flex-row sm:justify-between items-center gap-2">
            <div class="font font-bold text-xl bg-gradient-to-r from-[#92ebb1] to-[#FACC15] bg-clip-text text-transparent">Green Earth</div>
            <div>
                <ul class="flex justify-between gap-4 text-white">
                    <li>About</li>
                    <li>Gallery</li>
                    <li>Plant a Tree</li>
                </ul>
            </div>
            <div>
                <button class="btn px-3 py-2 border-none rounded-full text-[#15803D] bg-[#FACC15] cursor-pointer hover:bg-[#b0962e]">Plant a Tree</button>
            </div>
        </nav>
    </header>

    <main class="container mx-auto text-center mt-24">
        <h2 class="text-3xl font-semibold text-[#15803D] mb-3">Choose Your Trees</h2>

        <div class="grid grid-cols-1 md:grid-cols-12  gap-8 mx-auto ">
            <!--Categories-->
            <div class="col-span-12 md:col-span-3 flex flex-col items-center text-center">
                <h2 class="text-xl font-semibold text-center">Categories</h2>
                <br>
                
                <div class="space-y-3 p-3 sticky top-8">
                    <button id="allTreesButton" class="btn btn-primary border-[#15803D] w-[80%] md:w-full mx-auto">All Categories</button>

                    <!--Categories Container-->
                    <div id="categoriesContainer" class="space-y-3">

                    </div>
                </div>
            </div>
            <!--Trees-->
            <div class="col-span-6">
                <div id="treesContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-3 mt-5 ml-10 md:px-0">
                    <!--Dynamically Added Here-->
                    <!--Card-->
                    
                </div>

                <!--Loading spinner-->
                <div id="loadingSpinner" class="h-[60vh] text-center flex hidden items-center">
                    <span class="loading loading-spinner text-[#15803D]"></span>
                </div>
            </div>
            <!--Carts-->
            <div class="col-span-3">
                <div class="bg-white card card-body shadow-2xl  h-fit sticky top-8">
                    <h2 class="font-semibold text-gray-500 text-start text-xl mb-2"><i class="fa-brands fa-opencart"></i> Cart</h2>
                
                    <div class="space-y-4">
                        <!--card 1-->
                        <div id="cartContainer" class="space-y-4">
                            <!--Cart List-->
                        </div>

                        <!--Empty Cart Message-->
                        <div id="emptyCartMessage" class=" text-center py-4 text-gray-600 font-bold">
                            <p>Your Cart is empty.. <i class="fa-solid fa-cart-shopping"></i></p>
                            <p>Add Trees to get started <i class="fa-solid fa-tree"></i></p>
                        </div>

                        <!--Total Amount-->
                        <div class="flex justify-between items-center bg-[#F0FDF4] rounded-lg p-4 my-3 font-bold">
                            <span>Total : </span>
                            <span id="totalPrice">$0</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!--Trees details modal-->
        <!-- Open the modal using ID.showModal() method -->

        <dialog id="trees_detail_modal" class="modal text-start">
            <div class="modal-box">
                <h3 id="tree_title" class="text-lg font-bold text-start"></h3>
                <img
                 id="tree_img"
                    src=
                    alt=${tree.name} 
                    title=${tree.name} 
                    class="w-full !h-[250px] object-cover rounded-lg mb-12"
                >
                <div class="flex gap-2">
                    <p class="text-start text-black/60">Category:</p>
                    <div id="tree_cat" class="badge bg-[#b8e6c8] text-[#15803D]"></div>
                </div>
                <p id="tree_des" class="text-start line-clamp-2 text-black/60"></p>
                <h2 class="font-bold text-xl text-[#15803D]">$ <span id="tree_pp"></span></h2>
                <div class="modal-action">
                <form method="dialog">
                    <!-- if there is a button in form, it will close the modal -->
                    <button class="btn">Close</button>
                </form>
                </div>
            </div>
        </dialog>
    </main>

    <footer></footer>

    <script src="./scripts.js"></script>
</body>
</html>
